function FadeIn({children,delay=0}){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const ob=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);ob.disconnect();}},{threshold:0.12});
    ob.observe(el);return()=>ob.disconnect();
  },[]);
  return ce("div",{ref,style:{opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(40px)",transition:`opacity .7s ease ${delay}s, transform .7s ease ${delay}s`}},children);
}

              ce("div",{style:{fontSize:13,color:"rgba(255,255,255,.5)",fontWeight:500}},j.date),
              ce("div",{style:{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:2}},j.loc)),
            ce("div",null,
              ce("h3",{className:"exp-title",style:{fontSize:20,fontWeight:600,margin:"0 0 2px",letterSpacing:"-.01em",color:"#fff"}},j.title),
              ce("div",{style:{fontSize:15,color:"rgba(255,255,255,.55)",marginBottom:14}},j.company+" · "+j.sub),
              ce("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
                j.highlights.map((h,hi)=>ce("span",{key:hi,style:{fontSize:12,fontWeight:500,padding:"4px 12px",borderRadius:20,background:"rgba(100,255,218,.08)",color:"#a8e6d9",border:"1px solid rgba(100,255,218,.15)"}},h))))
          )
        ))
      )
    ),

    ce("section",{className:"footer-section",style:{background:"rgba(0,0,0,.4)",padding:"80px 40px",textAlign:"center",borderTop:"1px solid rgba(255,255,255,.05)"}},
      ce(FadeIn,null,
        ce("h2",{className:"footer-h2",style:{fontSize:40,fontWeight:700,color:"#fff",letterSpacing:"-.03em",margin:"0 0 12px"}},"Let's connect"),
        ce("p",{style:{fontSize:17,color:"rgba(255,255,255,.5)",marginBottom:32}},"Open to AI product leadership roles and advisory opportunities"),
        ce("a",{href:"https://www.linkedin.com/in/yun-chen-6b22a448/",target:"_blank",rel:"noreferrer",
          style:{display:"inline-flex",alignItems:"center",gap:8,padding:"14px 32px",borderRadius:40,background:"linear-gradient(135deg, #64ffda 0%, #40a9ff 100%)",color:"#0a0e27",fontSize:15,fontWeight:600,textDecoration:"none",transition:"transform .2s"},
          onMouseEnter:e=>e.target.style.transform="scale(1.04)",onMouseLeave:e=>e.target.style.transform="scale(1)"},"LinkedIn ↗")
      ),
      ce("div",{style:{marginTop:48,paddingTop:24,borderTop:"1px solid rgba(255,255,255,.05)",fontSize:12,color:"rgba(255,255,255,.25)"}},"© 2025 Yun Chen. All rights reserved.")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(ce(Site));
</script>
