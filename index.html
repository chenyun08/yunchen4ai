function FadeIn({children,delay=0,style={}}){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const ob=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);ob.disconnect();}},{threshold:0.12});
    ob.observe(el);return()=>ob.disconnect();
  },[]);
  return ce("div",{ref,style:{...style,opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(40px)",transition:`opacity .7s ease ${delay}s, transform .7s ease ${delay}s`}},children);
}
